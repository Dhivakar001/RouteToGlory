[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Security Headers ──────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking — do not allow this site to be embedded in iframes
    X-Frame-Options = "DENY"

    # Prevent MIME-type sniffing attacks
    X-Content-Type-Options = "nosniff"

    # Control referrer information leakage
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Enforce HTTPS for 1 year (enable after confirming HTTPS works)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Disable unused browser APIs
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"

    # Content Security Policy — restrict where resources can load from
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://apis.google.com https://www.gstatic.com https://*.firebaseapp.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.cloudfunctions.net https://*.firebaseapp.com wss://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; frame-src 'self' https://*.firebaseapp.com https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self';"

    # Prevent cross-origin information leakage
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Resource-Policy = "same-origin"

    # Enable DNS prefetching for performance
    X-DNS-Prefetch-Control = "on"

# ─── Cache Control for Hashed Static Assets ───
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── No Cache for HTML Shell (ensures fresh deploys) ───
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, no-cache, must-revalidate"

# ─── Cache Control for Service Worker ──────────
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, no-cache, must-revalidate"
